<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPI Kostick</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Times New Roman', Times, serif;
    background: #f0f0eb;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  /* ── SEARCH PANEL ── */
  .search-panel {
    width: 720px;
    background: #fff;
    border: 2px solid #1a6ab5;
    border-radius: 10px;
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    box-shadow: 0 2px 12px rgba(26,106,181,0.10);
    font-family: 'Segoe UI', sans-serif;
    margin-bottom: 12px;
  }
  .search-panel label { font-weight: 700; font-size: 13px; white-space: nowrap; color: #0d2a4a; }
  .search-panel input {
    flex: 1; min-width: 160px; padding: 9px 13px;
    border: 2px solid #b0c8e8; border-radius: 8px;
    font-size: 14px; font-family: inherit; color: #0d2a4a;
    outline: none; background: #f5f8fc; transition: border 0.2s;
  }
  .search-panel input:focus { border-color: #1a6ab5; background: #fff; }
  .btn {
    padding: 9px 22px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: #1a6ab5; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1354a0; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-reset { background: #e2e8f0; color: #475569; }
  .btn-reset:hover { background: #cbd5e1; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err-box {
    width: 720px;
    background: #fef2f2; border: 1.5px solid #fca5a5;
    border-radius: 8px; padding: 10px 16px;
    color: #dc2626; font-size: 13px; font-weight: 600;
    font-family: 'Segoe UI', sans-serif; display: none; margin-bottom: 10px;
  }
  .err-box.show { display: block; }

  /* ── TABS ── */
  .tabs {
    width: 720px;
    display: flex; gap: 0;
    margin-bottom: 0;
    font-family: 'Segoe UI', sans-serif;
  }
  .tab-btn {
    flex: 1; padding: 10px 0;
    border: 1px solid #bbb; border-bottom: none;
    background: #e8e8e4; color: #555;
    font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    border-radius: 8px 8px 0 0;
  }
  .tab-btn:first-child { margin-right: -1px; }
  .tab-btn.active {
    background: #fff; color: #1a6ab5;
    border-color: #bbb; z-index: 2;
    border-bottom: 2px solid #fff;
  }
  .tab-btn:hover:not(.active) { background: #d8d8d4; }

  /* ── TAB CONTENT ── */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── PAGE (grid) ── */
  .page {
    background: #fff;
    width: 720px;
    padding: 20px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.12);
    border: 1px solid #bbb;
  }

  /* ── HEADER TOP/BOT ── */
  .header-top {
    display: grid;
    grid-template-columns: 48px repeat(10, 1fr) 48px;
    align-items: end; margin-bottom: 3px; padding: 0 2px;
  }
  .header-top .lbl, .header-bottom .lbl {
    text-align: center; font-size: 10px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .hdr-box {
    width: 22px; height: 22px; border: 1px solid #333;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 900; color: #1a1a1a;
  }
  .header-bottom {
    display: grid;
    grid-template-columns: 48px repeat(10, 1fr) 48px;
    align-items: start; margin-top: 3px; padding: 0 2px;
  }

  /* ── GRID ── */
  .grid-wrapper { position: relative; border: 1px solid #333; }
  .grid { display: grid; grid-template-columns: 48px repeat(9, 1fr); }
  .arrow-left-col { display: flex; flex-direction: column; }
  .arrow-left-cell {
    height: 52px; display: flex; align-items: center; justify-content: center;
    border-bottom: 1px dotted #aaa; border-right: 1px solid #333;
  }
  .arrow-left-cell:last-child { border-bottom: none; }
  .num-col-wrap { display: flex; flex-direction: column; border-right: 1px solid #aaa; }
  .num-col-wrap:last-child { border-right: none; }
  .num-cell {
    height: 52px; border-bottom: 1px dotted #aaa;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .num-cell:last-child { border-bottom: none; }
  .num-cell .number { font-size: 9px; color: #999; margin-top: 1px; }
  .diagonal-line {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
  }
  .ans-A { font-size: 13px; font-weight: 900; color: #1a6ab5; }
  .ans-B { font-size: 13px; font-weight: 900; color: #dc2626; }

  /* ── CHART PAGE ── */
  .page-chart {
    background: #fff;
    width: 720px;
    padding: 24px 30px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.12);
    border: 1px solid #bbb;
    display: flex; flex-direction: column; align-items: center;
  }
  .chart-title {
    font-size: 22px; font-weight: bold; letter-spacing: 3px; margin-bottom: 2px;
  }
  .chart-subtitle { font-size: 11px; font-style: italic; color: #555; margin-bottom: 16px; }

  /* ── BIODATA ── */
  .biodata-bar {
    width: 720px;
    background: #fff;
    border: 1.5px solid #1a6ab5;
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 10px;
    font-family: 'Segoe UI', sans-serif;
    display: none;
    box-shadow: 0 2px 10px rgba(26,106,181,0.08);
  }
  .biodata-bar.show { display: block; }
  .biodata-title {
    font-size: 11px; font-weight: 700; color: #1a6ab5;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px;
  }
  .biodata-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 16px;
  }
  .biodata-item { display: flex; flex-direction: column; gap: 2px; }
  .biodata-label { font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
  .biodata-value { font-size: 13px; color: #0d2a4a; font-weight: 600; }
  .status-badge {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
  }
  .status-aktif { background: #dcfce7; color: #16a34a; }
  .status-nonaktif { background: #fee2e2; color: #dc2626; }

  /* ── INTERPRETASI TAB ── */
  .page-interp {
    background: #fff;
    width: 720px;
    padding: 24px 28px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.12);
    border: 1px solid #bbb;
    font-family: 'Segoe UI', sans-serif;
  }
  .interp-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; padding-bottom: 12px;
    border-bottom: 2px solid #e2e8f0;
  }
  .interp-header h2 { font-size: 16px; font-weight: 800; color: #0d2a4a; letter-spacing: 0.5px; }
  .btn-gen-all {
    padding: 8px 18px; background: #1a6ab5; color: #fff;
    border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-gen-all:hover { background: #1354a0; }
  .interp-empty {
    text-align: center; padding: 50px 20px;
    color: #94a3b8; font-size: 14px; font-style: italic;
  }
  .interp-category {
    margin-bottom: 22px;
  }
  .interp-cat-title {
    font-size: 10px; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; color: #1a6ab5;
    background: #f0f6ff; border-left: 3px solid #1a6ab5;
    padding: 5px 10px; margin-bottom: 10px; border-radius: 0 4px 4px 0;
  }
  .interp-card {
    border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 10px;
    transition: box-shadow 0.2s;
  }
  .interp-card:hover { box-shadow: 0 2px 10px rgba(26,106,181,0.10); }
  .interp-card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .interp-letter-badge {
    display: flex; align-items: center; gap: 10px;
  }
  .letter-box {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: #fff;
    background: #1a6ab5; flex-shrink: 0;
  }
  .letter-box.reversed { background: #7c3aed; }
  .letter-info { display: flex; flex-direction: column; gap: 1px; }
  .letter-name { font-size: 12px; font-weight: 700; color: #0d2a4a; }
  .letter-desc { font-size: 10px; color: #64748b; }
  .interp-score-area { display: flex; align-items: center; gap: 10px; }
  .score-pill {
    padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 900;
    min-width: 40px; text-align: center;
  }
  .score-low    { background: #fee2e2; color: #dc2626; }
  .score-mid    { background: #fef9c3; color: #854d0e; }
  .score-high   { background: #dcfce7; color: #16a34a; }
  .score-rev-low  { background: #dcfce7; color: #16a34a; }
  .score-rev-mid  { background: #fef9c3; color: #854d0e; }
  .score-rev-high { background: #fee2e2; color: #dc2626; }
  .score-label { font-size: 10px; color: #94a3b8; font-weight: 600; }
  .btn-gen-one {
    padding: 5px 12px; background: #f1f5f9; color: #475569;
    border: 1px solid #cbd5e1; border-radius: 6px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.15s; white-space: nowrap;
  }
  .btn-gen-one:hover { background: #e2e8f0; color: #0d2a4a; }
  .interp-text {
    font-size: 13px; line-height: 1.7; color: #334155;
    background: #f8fafc; border-radius: 8px; padding: 12px 14px;
    border-left: 3px solid #cbd5e1; transition: opacity 0.3s;
  }
  .interp-text.fade { opacity: 0.3; }
  .score-bar-wrap { margin-bottom: 10px; }
  .score-bar-bg {
    height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden;
  }
  .score-bar-fill {
    height: 100%; border-radius: 3px; transition: width 0.4s ease;
    background: linear-gradient(90deg, #1a6ab5, #3b82f6);
  }
  .score-bar-fill.reversed { background: linear-gradient(90deg, #7c3aed, #a855f7); }

  @media print {
    body { background: white; padding: 0; }
    .page, .page-chart { box-shadow: none; border: none; }
    .search-panel, .err-box, .tabs { display: none !important; }
    .tab-content { display: block !important; }
  }
</style>
</head>
<body>

<!-- BIODATA BAR -->
<div class="biodata-bar" id="biodataBar">
  <div class="biodata-title">📋 Data Peserta</div>
  <div class="biodata-grid">
    <div class="biodata-item">
      <span class="biodata-label">Nama</span>
      <span class="biodata-value" id="bd-nama">—</span>
    </div>
    <div class="biodata-item">
      <span class="biodata-label">Jenis Kelamin</span>
      <span class="biodata-value" id="bd-jk">—</span>
    </div>
    <div class="biodata-item">
      <span class="biodata-label">Usia</span>
      <span class="biodata-value" id="bd-usia">—</span>
    </div>
    <div class="biodata-item">
      <span class="biodata-label">Pendidikan</span>
      <span class="biodata-value" id="bd-pendidikan">—</span>
    </div>
    <div class="biodata-item">
      <span class="biodata-label">Telepon</span>
      <span class="biodata-value" id="bd-telepon">—</span>
    </div>
    <div class="biodata-item">
      <span class="biodata-label">Tanggal Tes</span>
      <span class="biodata-value" id="bd-tgl">—</span>
    </div>
    <div class="biodata-item">
      <span class="biodata-label">Status</span>
      <span class="biodata-value" id="bd-status">—</span>
    </div>
  </div>
</div>

<!-- SEARCH PANEL -->
<div class="search-panel">
  <label>🔎 ID Peserta:</label>
  <input type="text" id="inputId" placeholder="Masukkan id_x peserta..."
    autocomplete="off" onkeydown="if(event.key==='Enter') cariData()">
  <button class="btn btn-primary" id="btnCari" onclick="cariData()">Cari</button>
  <button class="btn btn-reset" onclick="resetAll()">Reset</button>
</div>
<div class="err-box" id="errBox"></div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('tab-grid', this)">📋 Lembar Jawaban</button>
  <button class="tab-btn" onclick="switchTab('tab-chart', this)">🎯 Profil PAPI</button>
  <button class="tab-btn" onclick="switchTab('tab-interp', this)">📝 Interpretasi</button>
</div>

<!-- TAB 1: GRID -->
<div id="tab-grid" class="tab-content active">
<div class="page">
  <div class="header-top">
    <div class="lbl"><span>Total</span><span class="hdr-box" id="hdr-total-top"></span></div>
    <div class="lbl"><span>G</span><span class="hdr-box" id="hdr-G"></span></div>
    <div class="lbl"><span>L</span><span class="hdr-box" id="hdr-L"></span></div>
    <div class="lbl"><span>I</span><span class="hdr-box" id="hdr-I"></span></div>
    <div class="lbl"><span>T</span><span class="hdr-box" id="hdr-T"></span></div>
    <div class="lbl"><span>V</span><span class="hdr-box" id="hdr-V"></span></div>
    <div class="lbl"><span>S</span><span class="hdr-box" id="hdr-S"></span></div>
    <div class="lbl"><span>R</span><span class="hdr-box" id="hdr-R"></span></div>
    <div class="lbl"><span>D</span><span class="hdr-box" id="hdr-D"></span></div>
    <div class="lbl"><span>C</span><span class="hdr-box" id="hdr-C"></span></div>
    <div class="lbl"><span>E</span><span class="hdr-box" id="hdr-E"></span></div>
    <div class="lbl"></div>
  </div>
  <div class="grid-wrapper">
    <div class="grid" id="mainGrid"></div>
    <svg class="diagonal-line" id="diagSvg" xmlns="http://www.w3.org/2000/svg">
      <line id="diagLine" stroke="#333" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="header-bottom">
    <div class="lbl"><span class="hdr-box" id="hdr-N"></span><span>N</span></div>
    <div class="lbl"><span class="hdr-box" id="hdr-A"></span><span>A</span></div>
    <div class="lbl"><span class="hdr-box" id="hdr-P"></span><span>P</span></div>
    <div class="lbl"><span class="hdr-box" id="hdr-X"></span><span>X</span></div>
    <div class="lbl"><span class="hdr-box" id="hdr-B"></span><span>B</span></div>
    <div class="lbl"><span class="hdr-box" id="hdr-O"></span><span>O</span></div>
    <div class="lbl"><span class="hdr-box" id="hdr-Z"></span><span>Z</span></div>
    <div class="lbl"><span class="hdr-box" id="hdr-K"></span><span>K</span></div>
    <div class="lbl"><span class="hdr-box" id="hdr-F"></span><span>F</span></div>
    <div class="lbl"><span class="hdr-box" id="hdr-W"></span><span>W</span></div>
    <div class="lbl"><span class="hdr-box" id="hdr-total-bot"></span><span>Total</span></div>
    <div class="lbl"></div>
  </div>
</div>
</div>

<!-- TAB 2: CHART -->
<div id="tab-chart" class="tab-content">
<div class="page-chart">
  <div class="chart-title">PAPI</div>
  <div class="chart-subtitle">Preference Inventory</div>
  <svg id="papiSvg" width="660" height="660" viewBox="0 0 660 660" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
</div>

<!-- TAB 3: INTERPRETASI -->
<div id="tab-interp" class="tab-content">
<div class="page-interp">
  <div class="interp-header">
    <h2>📝 Interpretasi Hasil PAPI Kostick</h2>
    <button class="btn-gen-all" onclick="generateAll()">🔄 Generate Semua Ulang</button>
  </div>
  <div id="interpContent">
    <div class="interp-empty">Silakan cari data peserta terlebih dahulu untuk melihat interpretasi.</div>
  </div>
</div>
</div>

<script>
// ─── TABS ─────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ─── API CONFIG ────────────────────────────────────────────────
const API_R = 'https://lidan-co-id.pages.dev/api/contacts_filter_dinamis7';
const TBL   = 'nilai1_json';
const AUTH  = 'admin';

// ─── BIODATA ──────────────────────────────────────────────────
function tampilkanBiodata(x02) {
  let bio = {};
  try { bio = JSON.parse(x02 || '{}'); } catch {}
  const jkMap = { 'L':'Laki-laki', 'P':'Perempuan', 'l':'Laki-laki', 'p':'Perempuan' };
  const pendMap = { 'sd':'SD','smp':'SMP','sma':'SMA/SMK','d3':'D3','s1':'S1','s2':'S2','s3':'S3' };
  document.getElementById('bd-nama').textContent      = bio.nama || '—';
  document.getElementById('bd-jk').textContent        = jkMap[bio.jenis_kelamin] || bio.jenis_kelamin || '—';
  document.getElementById('bd-usia').textContent      = bio.usia ? bio.usia + ' tahun' : '—';
  document.getElementById('bd-pendidikan').textContent= pendMap[(bio.pendidikan||'').toLowerCase()] || bio.pendidikan || '—';
  document.getElementById('bd-telepon').textContent   = bio.telepon || '—';
  const tgl = bio.tgl_tes ? new Date(bio.tgl_tes).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}) : '—';
  document.getElementById('bd-tgl').textContent = tgl;
  const statusEl = document.getElementById('bd-status');
  const st = (bio.status || '').toLowerCase();
  statusEl.innerHTML = `<span class="status-badge ${st==='aktif'?'status-aktif':'status-nonaktif'}">${bio.status||'—'}</span>`;
  document.getElementById('biodataBar').classList.add('show');
}

function sembunyikanBiodata() {
  document.getElementById('biodataBar').classList.remove('show');
}

// ─── INTERPRETASI DATA ────────────────────────────────────────
// Setiap skala punya 3 band: rendah (0-3), sedang (4-6), tinggi (7-9)
// K dan Z: REVERSED — skor rendah = intensitas tinggi, skor tinggi = intensitas rendah
const INTERP_META = {
  G: { nama: 'Peran Sebagai Pekerja Keras', kategori: 'ARAH KERJA', reversed: false },
  L: { nama: 'Peran Sebagai Pemimpin',       kategori: 'KEPEMIMPINAN', reversed: false },
  I: { nama: 'Mudah Membuat Keputusan',      kategori: 'KEPEMIMPINAN', reversed: false },
  T: { nama: 'Tempo Kerja',                  kategori: 'AKTIFITAS', reversed: false },
  V: { nama: 'Stamina',                      kategori: 'AKTIFITAS', reversed: false },
  S: { nama: 'Pergaulan Luas',               kategori: 'PERGAULAN', reversed: false },
  R: { nama: 'Tipe Teoritis',                kategori: 'GAYA KERJA', reversed: false },
  D: { nama: 'Suka Pekerjaan yang Terperinci', kategori: 'GAYA KERJA', reversed: false },
  C: { nama: 'Suka Pekerjaan yang Teratur',  kategori: 'GAYA KERJA', reversed: false },
  E: { nama: 'Pengendalian Emosi',           kategori: 'SIFAT', reversed: false },
  N: { nama: 'Menyelesaikan Tugas Secara Pribadi', kategori: 'ARAH KERJA', reversed: false },
  A: { nama: 'Hasrat untuk Berprestasi',     kategori: 'ARAH KERJA', reversed: false },
  P: { nama: 'Mengendalikan Orang Lain',     kategori: 'KEPEMIMPINAN', reversed: false },
  X: { nama: 'Memperoleh Perhatian',         kategori: 'PERGAULAN', reversed: false },
  B: { nama: 'Kebutuhan Betah dalam Kelompok', kategori: 'PERGAULAN', reversed: false },
  O: { nama: 'Kebutuhan untuk Menyayangi',   kategori: 'PERGAULAN', reversed: false },
  Z: { nama: 'Hasil Kreasi',                 kategori: 'SIFAT', reversed: true  },
  K: { nama: 'Agresif',                      kategori: 'SIFAT', reversed: true  },
  F: { nama: 'Dorongan untuk Ketaatan',      kategori: 'KETAATAN', reversed: false },
  W: { nama: 'Kebutuhan Taat Atasan & Peraturan', kategori: 'KETAATAN', reversed: false },
};

// Kalimat interpretasi: 5 variasi per band, pembuka bervariasi
const INTERP_KALIMAT = {
  G: {
    rendah: [
      'Ritme kerja yang santai dan tidak tergesa-gesa menjadi pola yang cukup dominan pada dirinya. Ia lebih suka menjalani pekerjaan sesuai kapasitas yang ada tanpa memaksakan diri.',

const KATEGORI_ORDER = ['ARAH KERJA','KEPEMIMPINAN','AKTIFITAS','PERGAULAN','GAYA KERJA','SIFAT','KETAATAN'];
const LETTER_ORDER_DISPLAY = ['G','N','A','L','P','I','T','V','S','X','B','O','R','D','C','E','Z','K','F','W'];

// Track current sentence index per letter
const currentVariant = {};

function getBand(score, reversed) {
  if (reversed) {
    // Skor rendah = intensitas tinggi
    if (score <= 3) return 'rendah';
    if (score <= 6) return 'sedang';
    return 'tinggi';
  } else {
    if (score <= 3) return 'rendah';
    if (score <= 6) return 'sedang';
    return 'tinggi';
  }
}

function getBandLabel(score, reversed) {
  if (reversed) {
    if (score <= 3) return { label: 'Tinggi ↑', cls: 'score-rev-low' };
    if (score <= 6) return { label: 'Sedang', cls: 'score-rev-mid' };
    return { label: 'Rendah ↓', cls: 'score-rev-high' };
  } else {
    if (score <= 3) return { label: 'Rendah ↓', cls: 'score-low' };
    if (score <= 6) return { label: 'Sedang', cls: 'score-mid' };
    return { label: 'Tinggi ↑', cls: 'score-high' };
  }
}

function getKalimat(letter, score) {
  const meta = INTERP_META[letter];
  if (!meta) return '';
  const band = getBand(score, meta.reversed);
  const arr = INTERP_KALIMAT[letter]?.[band];
  if (!arr || arr.length === 0) return '';
  const idx = currentVariant[letter] ?? 0;
  return arr[idx % arr.length];
}

function nextVariant(letter) {
  const score = window._lastScores?.[letter];
  if (score === undefined) return;
  const meta = INTERP_META[letter];
  const band = getBand(score, meta.reversed);
  const arr = INTERP_KALIMAT[letter]?.[band];
  if (!arr) return;
  currentVariant[letter] = ((currentVariant[letter] ?? 0) + 1) % arr.length;
  const el = document.getElementById('interp-text-' + letter);
  if (el) {
    el.classList.add('fade');
    setTimeout(() => {
      el.textContent = getKalimat(letter, score);
      el.classList.remove('fade');
    }, 200);
  }
}

function generateAll() {
  if (!window._lastScores) return;
  LETTER_ORDER_DISPLAY.forEach(letter => {
    const score = window._lastScores[letter];
    if (score === undefined) return;
    const meta = INTERP_META[letter];
    const band = getBand(score, meta.reversed);
    const arr = INTERP_KALIMAT[letter]?.[band];
    if (!arr) return;
    currentVariant[letter] = ((currentVariant[letter] ?? 0) + 1) % arr.length;
    const el = document.getElementById('interp-text-' + letter);
    if (el) {
      el.classList.add('fade');
      setTimeout(() => {
        el.textContent = getKalimat(letter, score);
        el.classList.remove('fade');
      }, 150);
    }
  });
}

function buildInterpretasi(scores) {
  window._lastScores = scores;
  // Randomize starting variant for each letter agar tidak selalu mulai dari kalimat yg sama
  LETTER_ORDER_DISPLAY.forEach(l => {
    const meta = INTERP_META[l];
    const band = getBand(scores[l] ?? 0, meta?.reversed ?? false);
    const arr = INTERP_KALIMAT[l]?.[band];
    const len = arr ? arr.length : 1;
    currentVariant[l] = Math.floor(Math.random() * len);
  });

  const container = document.getElementById('interpContent');
  container.innerHTML = '';

  KATEGORI_ORDER.forEach(kat => {
    const letters = LETTER_ORDER_DISPLAY.filter(l => INTERP_META[l]?.kategori === kat);
    if (!letters.length) return;

    const catDiv = document.createElement('div');
    catDiv.className = 'interp-category';
    catDiv.innerHTML = `<div class="interp-cat-title">${kat}</div>`;

    letters.forEach(letter => {
      const score = scores[letter];
      if (score === undefined) return;
      const meta = INTERP_META[letter];
      const { label, cls } = getBandLabel(score, meta.reversed);
      const kalimat = getKalimat(letter, score);
      const barPct = meta.reversed ? Math.round((1 - score / 9) * 100) : Math.round((score / 9) * 100);
      const barCls = meta.reversed ? 'reversed' : '';

      const card = document.createElement('div');
      card.className = 'interp-card';
      card.innerHTML = `
        <div class="interp-card-header">
          <div class="interp-letter-badge">
            <div class="letter-box${meta.reversed ? ' reversed' : ''}">${letter}</div>
            <div class="letter-info">
              <span class="letter-name">${meta.nama}</span>
              <span class="letter-desc">${meta.reversed ? '⚠ Skala terbalik (0 = intensitas tinggi)' : 'Skala normal (9 = intensitas tinggi)'}</span>
            </div>
          </div>
          <div class="interp-score-area">
            <div>
              <div class="score-pill ${cls}">${score}</div>
              <div class="score-label" style="text-align:center;margin-top:2px">${label}</div>
            </div>
            <button class="btn-gen-one" onclick="nextVariant('${letter}')">🔄 Ganti</button>
          </div>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar-bg">
            <div class="score-bar-fill ${barCls}" style="width:${barPct}%"></div>
          </div>
        </div>
        <div class="interp-text" id="interp-text-${letter}">${kalimat}</div>
      `;
      catDiv.appendChild(card);
    });

    container.appendChild(catDiv);
  });
}

function clearInterpretasi() {
  window._lastScores = null;
  document.getElementById('interpContent').innerHTML =
    '<div class="interp-empty">Silakan cari data peserta terlebih dahulu untuk melihat interpretasi.</div>';
}

function hitungSkala(answers, key) {
  const m = MAPPING[key];
  let t = 0;
  m.A.forEach(s => { if (answers[s-1] === 'A') t++; });
  m.B.forEach(s => { if (answers[s-1] === 'B') t++; });
  return t;
}

function hitungSemua(answers) {
  const G=hitungSkala(answers,'G'), L=hitungSkala(answers,'L'),
        I=hitungSkala(answers,'I'), T=hitungSkala(answers,'T'),

const CX = 330, CY = 330;
const R_OUTER   = 310;
const R_CAT     = 280;
const R_SUBCAT  = 245;
const R_LETTER  = 210;
const R_SCALE_O = 198;
const R_SCALE_I = 80;

function toRad(deg) { return deg * Math.PI / 180; }
function polar(cx, cy, r, deg) {
  return [cx + r * Math.cos(toRad(deg)), cy + r * Math.sin(toRad(deg))];
}
function arcPath(r1, r2, s, e) {
  const [x1,y1]=polar(CX,CY,r1,s), [x2,y2]=polar(CX,CY,r1,e);
  const [x3,y3]=polar(CX,CY,r2,e), [x4,y4]=polar(CX,CY,r2,s);
  const lg = (e-s)>180?1:0;
  return `M${x1},${y1} A${r1},${r1} 0 ${lg} 1 ${x2},${y2} L${x3},${y3} A${r2},${r2} 0 ${lg} 0 ${x4},${y4} Z`;
}
function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}
function svgText(txt, x, y, size, fill, weight='normal', rotate=0, style='normal') {
  const t = svgEl('text', {
    x, y, 'font-size': size, fill, 'text-anchor':'middle',
    'dominant-baseline':'middle', 'font-family':'Times New Roman, serif',
    'font-weight': weight, 'font-style': style
  });
  if (rotate) t.setAttribute('transform', `rotate(${rotate},${x},${y})`);
  t.textContent = txt;
  return t;
}

function buildChart(scores) {

    const textR = (R_OUTER + R_CAT) / 2;

    const [ex,ey] = polar(CX, CY, textR, end-1);
    const pid = 'cp_' + cat.name.replace(/\s/g,'');

    const textEl = svgEl('text', { 'font-size':9, fill:'#fff', 'font-family':'Times New Roman, serif', 'font-weight':'bold' });
    const tp = svgEl('textPath', { href:'#'+pid, startOffset:'50%', 'text-anchor':'middle' });
    tp.textContent = cat.name;
    textEl.appendChild(tp);
    svg.appendChild(textEl);

    deg = end;

  LETTERS_ORDER.forEach(letter => {
    const s = deg, e = deg + SEG, mid = (s+e)/2;
    svg.appendChild(svgEl('path', { d:arcPath(R_CAT, R_SUBCAT, s, e), fill:'#333', stroke:'#fff', 'stroke-width':0.5 }));
    const lr = (R_CAT + R_SUBCAT) / 2;
    const [lx,ly] = polar(CX, CY, lr, mid);
    const lines = (SUB_LABELS[letter]||'').split('\n');
    lines.forEach((line, li) => {
      const offset = (li - (lines.length-1)/2) * 8;
      svg.appendChild(svgText(line, lx, ly+offset, 5.5, '#fff', 'normal', mid+90));
    });
    deg = e;
  });

  // Letter ring
  deg = START;
  LETTERS_ORDER.forEach(letter => {
    const s = deg, e = deg + SEG, mid = (s+e)/2;
    svg.appendChild(svgEl('path', { d:arcPath(R_SUBCAT, R_LETTER, s, e), fill:'#fff', stroke:'#333', 'stroke-width':0.8 }));
    const [lx,ly] = polar(CX, CY, (R_SUBCAT+R_LETTER)/2, mid);
    svg.appendChild(svgText(letter, lx, ly, 14, '#000', 'bold', mid+90));
    deg = e;
  });

  // Scale number rings + radial lines + store positions
  deg = START;
  LETTERS_ORDER.forEach(letter => {
    const s = deg, e = deg + SEG, mid = (s+e)/2;
    const isRev = REVERSED.has(letter);
    if (!scorePos[letter]) scorePos[letter] = {};

    for (let n = 0; n <= 9; n++) {
      const frac = n / 9;
      const r = R_SCALE_I + frac * (R_SCALE_O - R_SCALE_I);
      const displayNum = isRev ? (9-n) : n;
      const [nx,ny] = polar(CX, CY, r, mid);
      scorePos[letter][displayNum] = { x: nx, y: ny, r };
      svg.appendChild(svgText(String(displayNum), nx, ny, 7, '#000', 'normal', mid+90));
    }

    // Radial divider
    const [ls0x,ls0y] = polar(CX, CY, R_SCALE_I, s);
    const [ls1x,ls1y] = polar(CX, CY, R_LETTER,  s);
    svg.appendChild(svgEl('line', { x1:ls0x, y1:ls0y, x2:ls1x, y2:ls1y, stroke:'#333', 'stroke-width':0.5 }));

    deg = e;
  });

  // Concentric rings (faint)
  for (let n = 0; n <= 9; n++) {
    const r = R_SCALE_I + (n/9) * (R_SCALE_O - R_SCALE_I);
    svg.appendChild(svgEl('circle', { cx:CX, cy:CY, r, fill:'none', stroke:'#ccc', 'stroke-width':0.4 }));
  }

  // Inner circle
  svg.appendChild(svgEl('circle', { cx:CX, cy:CY, r:R_SCALE_I, fill:'#fff', stroke:'#333', 'stroke-width':1 }));

  // Outer border circles
  svg.appendChild(svgEl('circle', { cx:CX, cy:CY, r:R_OUTER,  fill:'none', stroke:'#333', 'stroke-width':2 }));
  svg.appendChild(svgEl('circle', { cx:CX, cy:CY, r:R_LETTER, fill:'none', stroke:'#333', 'stroke-width':1 }));

  // ── Draw score circles if scores provided ──
  if (scores) drawScoreCircles(svg, scores);
}

function drawScoreCircles(svg, scores) {
  const scoreMap = {
    N: scores.N, G: scores.G, A: scores.A, L: scores.L,
    P: scores.P, I: scores.I, T: scores.T, V: scores.V,
    X: scores.X, B: scores.B, O: scores.O, S: scores.S,
    C: scores.C, D: scores.D, R: scores.R, Z: scores.Z,
    E: scores.E, K: scores.K, F: scores.F, W: scores.W,
  };

  // Collect ordered positions for all 20 letters
  const points = [];
  LETTERS_ORDER.forEach(letter => {
    const val = scoreMap[letter];
    if (val === undefined || val === null) { points.push(null); return; }
    const n = Math.max(0, Math.min(9, val));
    const pos = scorePos[letter] && scorePos[letter][n];
    points.push(pos || null);
  });

  // Draw connecting polygon (closed) — drawn BEFORE circles so circles appear on top
  const validPts = points.filter(Boolean);
  if (validPts.length >= 2) {
    // Build polyline points string following LETTERS_ORDER, skip nulls
    const allPts = [...points, points[0]]; // close the shape
    let d = '';
    let started = false;
    allPts.forEach(p => {
      if (!p) return;
      if (!started) { d += `M${p.x},${p.y}`; started = true; }
      else d += ` L${p.x},${p.y}`;
    });
    svg.appendChild(svgEl('path', {
      d,
      fill: 'rgba(220,30,0,0.08)',
      stroke: '#e03',
      'stroke-width': 1.5,
      'stroke-linejoin': 'round'
    }));
  }

  // Draw circles on top of lines
  LETTERS_ORDER.forEach(letter => {
    const val = scoreMap[letter];
    if (val === undefined || val === null) return;
    const n = Math.max(0, Math.min(9, val));
    const pos = scorePos[letter] && scorePos[letter][n];
    if (!pos) return;
    svg.appendChild(svgEl('circle', {
      cx: pos.x, cy: pos.y, r: 7,
      fill: '#fff', stroke: '#e03', 'stroke-width': 1.8
    }));
  });
}

// ─── RESET / UI ────────────────────────────────────────────────
function resetAll() {
  clearErr(); buildGrid([]); clearKotakHeader();
  buildChart(null);
  sembunyikanBiodata();
  clearInterpretasi();
  document.getElementById('inputId').value = '';
}
function showErr(msg) { const el=document.getElementById('errBox'); el.textContent=msg; el.classList.add('show'); }
function clearErr()   { document.getElementById('errBox').classList.remove('show'); }
function setBtn(loading) {
  const btn = document.getElementById('btnCari');
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span> Mencari...' : 'Cari';
}

// ─── FETCH ─────────────────────────────────────────────────────
async function cariData() {
  const idVal = document.getElementById('inputId').value.trim();
  if (!idVal) { showErr('⚠ Masukkan id_x peserta terlebih dahulu.'); return; }
  clearErr(); setBtn(true);
  try {
    const res = await fetch(`${API_R}?table=${TBL}&id_x=${encodeURIComponent(idVal)}`,
      { headers: { 'X-Custom-Auth': AUTH } });
    const d = await res.json();
    if (!d.success || !d.data) { showErr('⚠ Tidak ada data untuk ID: ' + idVal); return; }
    const row = Array.isArray(d.data) ? d.data[0] : d.data;
    if (!row) { showErr('⚠ Tidak ada data untuk ID: ' + idVal); return; }
    // Biodata dari x_02
    tampilkanBiodata(row.x_02 || '{}');
    // Jawaban dari x_06
    let x06 = {};
    try { x06 = JSON.parse(row.x_06 || '{}'); } catch {}
    const answers = parsePapi(x06.papi || '');
    buildGrid(answers);
    const sc = hitungSemua(answers);
    isiKotakHeader(sc);
    buildChart(sc);
    buildInterpretasi(sc);
  } catch (e) {
    showErr('⚠ Gagal: ' + e.message);
  } finally {
    setBtn(false);
  }
}

// ─── INIT ──────────────────────────────────────────────────────
buildGrid([]);
buildChart(null);
</script>
