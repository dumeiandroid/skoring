<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lembar Jawaban I.S.T.</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Times New Roman', Times, serif;
    background: #e8e8e4;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 16px;
  }

  /* ── SEARCH PANEL ── */
  .search-panel {
    width: 750px;
    background: #fff;
    border: 2px solid #1a6ab5;
    border-radius: 10px;
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    box-shadow: 0 2px 12px rgba(26,106,181,0.10);
    font-family: 'Segoe UI', sans-serif;
  }
  .search-panel label { font-weight: 700; font-size: 13px; white-space: nowrap; color: #0d2a4a; }
  .search-panel input {
    flex: 1; min-width: 160px;
    padding: 9px 13px;
    border: 2px solid #b0c8e8; border-radius: 8px;
    font-size: 14px; font-family: inherit; color: #0d2a4a;
    outline: none; background: #f5f8fc; transition: border 0.2s;
  }
  .search-panel input:focus { border-color: #1a6ab5; background: #fff; }
  .btn {
    padding: 9px 22px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: #1a6ab5; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1354a0; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-reset { background: #e2e8f0; color: #475569; }
  .btn-reset:hover { background: #cbd5e1; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err-box {
    width: 750px;
    background: #fef2f2; border: 1.5px solid #fca5a5;
    border-radius: 8px; padding: 10px 16px;
    color: #dc2626; font-size: 13px; font-weight: 600;
    font-family: 'Segoe UI', sans-serif; display: none;
  }
  .err-box.show { display: block; }

  /* ── PAGE ── */
  .page {
    background: #fff;
    width: 750px;
    padding: 28px 32px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.15);
    border: 1px solid #bbb;
  }

  .page-title {
    text-align: center;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  /* ── HEADER FIELDS ── */
  .header-area { display: flex; gap: 16px; margin-bottom: 14px; }
  .fields { flex: 1; font-size: 10.5px; }
  .field-row { display: flex; align-items: flex-end; margin-bottom: 4px; gap: 4px; }
  .field-row label { width: 130px; flex-shrink: 0; font-size: 10.5px; }
  .field-row .dots {
    flex: 1; border-bottom: 1px dotted #555; height: 14px;
    font-size: 10px; color: #555;
  }
  .field-row .suffix { white-space: nowrap; font-size: 10.5px; margin-left: 4px; }
  .field-filled {
    flex: 1; border-bottom: 1px dotted #555; height: 14px;
    font-size: 10.5px; font-weight: bold; color: #111;
    display: inline-flex; align-items: flex-end;
  }

  /* ── SCORE TABLE ── */
  .score-table { flex-shrink: 0; border-collapse: collapse; font-size: 10px; height: fit-content; }
  .score-table th, .score-table td {
    border: 1px solid #333; text-align: center;
    padding: 2px 6px; min-width: 28px; height: 18px;
  }
  .score-table th { font-weight: bold; background: #fff; }
  .score-table td.row-label { text-align: left; padding-left: 4px; font-weight: bold; }

  /* ── GRAPH ── */
  .graph-section { margin-bottom: 10px; }
  .graph-container { display: flex; gap: 4px; align-items: stretch; }
  .y-axis-left {
    display: flex; flex-direction: column; justify-content: space-between;
    font-size: 9px; text-align: right;
    padding-right: 3px; padding-top: 18px; padding-bottom: 2px;
  }
  .y-axis-right {
    display: flex; flex-direction: column; justify-content: space-between;
    font-size: 9px; text-align: left;
    padding-left: 3px; padding-top: 18px; padding-bottom: 2px;
  }
  .graph-grid { flex: 1; border-collapse: collapse; font-size: 9.5px; }
  .graph-grid th {
    border: 1px solid #333; text-align: center;
    padding: 2px 0; font-weight: bold; height: 18px;
  }
  .graph-grid td { border: 1px solid #ccc; height: 14px; min-width: 38px; }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px dotted #888; margin: 14px 0; }

  /* ── ANSWER SECTIONS ── */
  .answer-area {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0 10px; margin-bottom: 12px;
  }
  .answer-col {}
  .col-header {
    font-size: 10px; font-weight: bold; margin-bottom: 4px;
    display: flex; gap: 6px; align-items: center;
  }
  .col-header .sect-num { font-weight: bold; }
  .col-header .options { display: flex; gap: 8px; font-size: 9.5px; }

  .answer-row {
    display: flex; align-items: center;
    margin-bottom: 2px; font-size: 9.5px; gap: 2px;
  }
  .answer-row .qnum {
    width: 24px; text-align: right; flex-shrink: 0; font-size: 9px;
  }
  .answer-row .opts { display: flex; gap: 8px; font-size: 9.5px; }
  .answer-row .opts span { width: 10px; text-align: center; }
  .answer-row .dot-line {
    flex: 1; border-bottom: 1px dotted #666; height: 12px; min-width: 80px;
  }
  .answer-row .num-opts { display: flex; gap: 5px; font-size: 9px; }
  .answer-row .num-opts span { width: 10px; text-align: center; }

  /* ── SCORE BOXES ── */
  .score-boxes { display: flex; justify-content: space-around; margin-top: 14px; }
  .score-box {
    width: 80px; height: 40px; border: 2px solid #333;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Times New Roman', serif;
  }
  .score-box .box-label {
    font-size: 7.5px; color: #555; font-weight: bold; letter-spacing: 0.3px;
    text-transform: uppercase; line-height: 1;
  }
  .score-box .box-value {
    font-size: 16px; font-weight: 900; color: #111; line-height: 1.2;
  }

  /* ── PAGE 2 ── */
  .answer-grid-3col {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0 14px; margin-bottom: 10px;
  }
  .answer-grid-4col {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0 10px; margin-bottom: 10px;
  }

  /* ── JAWABAN TERISI ── */
  /* Pilihan huruf/angka yang dipilih */
  .opted-correct { color: #16a34a; font-weight: 900; }
  .opted-wrong   { color: #dc2626; font-weight: 900; text-decoration: line-through; }

  /* Dot-line terisi (ist4) */
  .dot-filled {
    flex: 1; height: 12px; min-width: 80px;
    font-size: 9.5px; font-weight: 700;
    display: inline-flex; align-items: flex-end;
    border-bottom: 1px solid currentColor;
  }
  .dot-filled.correct { color: #16a34a; }
  .dot-filled.wrong   { color: #dc2626; text-decoration: line-through; }

  /* Tanda ✓/✗ di ujung baris */
  .ans-mark { font-size: 9.5px; font-weight: 900; margin-left: 3px; flex-shrink: 0; }
  .ans-mark.correct { color: #16a34a; }
  .ans-mark.wrong   { color: #dc2626; }

  @media print {
    body { background: white; padding: 0; gap: 0; }
    .search-panel, .err-box { display: none !important; }
    .page { box-shadow: none; border: none; }
  }
</style>

<script>
// ─── API CONFIG ───────────────────────────────────────────────
const API_R = 'https://lidan-co-id.pages.dev/api/contacts_filter_dinamis7';
const TBL   = 'nilai1_json';
const AUTH  = 'admin';

// ─── GRAPH ───────────────────────────────────────────────────
const graphBody = document.getElementById('graphBody');
for (let r = 0; r < 7; r++) {
  const tr = document.createElement('tr');
  for (let c = 0; c < 10; c++) tr.appendChild(document.createElement('td'));
  graphBody.appendChild(tr);
}

// ─── PARSERS ─────────────────────────────────────────────────

// ist1/2/3/7/8/9: "1.1Bx✗;2.2Cv✗;..."
// → map[nomor] = { pilihan:'B', benar:false }
function parseAbcde(str) {
  const map = {};
  if (!str) return map;
  str.split(';').map(s => s.replace(/✗/g,'').trim()).filter(Boolean).forEach(token => {
    // format: urutan.nomor[A-E][v/x]
    const m = token.match(/^(\d+)\.(\d+)([A-Ea-e])(v|x)$/i);
    if (!m) return;
    const urutan = parseInt(m[1]);
    const pilihan = m[3].toLowerCase();
    const benar   = m[4].toLowerCase() === 'v';
    map[urutan] = { pilihan, benar };
  });
  return map;
}

// ist4: "1.1|ma|x|s0✗;..."
// → map[urutan] = { teks:'ma', benar:false }
function parseText(str) {
  const map = {};
  if (!str) return map;
  str.split(';').map(s => s.replace(/✗/g,'').trim()).filter(Boolean).forEach(token => {
    // format: urutan.nomor|teks|v/x|skor  (skor opsional)
    const m = token.match(/^(\d+)\.(\d+)\|([^|]*)\|(v|x)(?:\|(\d+))?$/i);
    if (!m) return;
    const urutan = parseInt(m[1]);
    const teks   = m[3].trim();
    const benar  = m[4].toLowerCase() === 'v';
    const skor   = m[5] !== undefined ? parseInt(m[5]) : (benar ? 1 : 0);
    map[urutan] = { teks, benar, skor };
  });
  return map;
}

// ist5/6: "1.1|345|x✗;..."
// → map[urutan] = { angka:'345', benar:false }
function parseAngka(str) {
  const map = {};
  if (!str) return map;
  str.split(';').map(s => s.replace(/✗/g,'').trim()).filter(Boolean).forEach(token => {
    // format: urutan.nomor|angka|v/x
    const m = token.match(/^(\d+)\.(\d+)\|([^|]*)\|(v|x)$/i);
    if (!m) return;
    const urutan = parseInt(m[1]);
    const angka  = m[3].trim();
    const benar  = m[4].toLowerCase() === 'v';
    map[urutan] = { angka, benar };
  });
  return map;
}

// ─── RENDER HELPERS ──────────────────────────────────────────

// abcde rows (ist1,2,3,7,8,9)
// opts: ['a','b','c','d','e']
function makeAbcdeRows(containerId, start, end, dataMap, offset=0) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const opts = ['a','b','c','d','e'];
  for (let n = start; n <= end; n++) {
    const idx = n - start + 1 + offset; // offset untuk lanjutan subtes
    const d   = dataMap ? dataMap[idx] : null;
    const row = document.createElement('div');
    row.className = 'answer-row';

    const qnum = document.createElement('span');
    qnum.className = 'qnum';
    qnum.textContent = n + ')';
    row.appendChild(qnum);

    const optsDiv = document.createElement('div');
    optsDiv.className = 'opts';
    opts.forEach(opt => {
      const sp = document.createElement('span');
      sp.textContent = opt;
      if (d && d.pilihan === opt) {
        sp.className = d.benar ? 'opted-correct' : 'opted-wrong';
      }
      optsDiv.appendChild(sp);
    });
    row.appendChild(optsDiv);

    if (d) {
      const mark = document.createElement('span');
      mark.className = 'ans-mark ' + (d.benar ? 'correct' : 'wrong');
      mark.textContent = d.benar ? '✓' : '✗';
      row.appendChild(mark);
    }

    container.appendChild(row);
  }
}

// num rows (ist5, ist6) — digit 1-9,0
function makeNumRows(containerId, start, end, dataMap) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const digits = ['1','2','3','4','5','6','7','8','9','0'];
  for (let n = start; n <= end; n++) {
    const idx = n - start + 1;
    const d   = dataMap ? dataMap[idx] : null;
    const row = document.createElement('div');
    row.className = 'answer-row';

    const qnum = document.createElement('span');
    qnum.className = 'qnum';
    qnum.textContent = n + ')';
    row.appendChild(qnum);

    const numDiv = document.createElement('div');
    numDiv.className = 'num-opts';

    // Tandai setiap digit yang ada dalam jawaban
    digits.forEach(dig => {
      const sp = document.createElement('span');
      sp.textContent = dig;
      if (d && d.angka && d.angka.includes(dig)) {
        sp.className = d.benar ? 'opted-correct' : 'opted-wrong';
      }
      numDiv.appendChild(sp);
    });
    row.appendChild(numDiv);

    if (d) {
      const mark = document.createElement('span');
      mark.className = 'ans-mark ' + (d.benar ? 'correct' : 'wrong');
      mark.textContent = d.benar ? '✓' : '✗';
      row.appendChild(mark);
    }

    container.appendChild(row);
  }
}

// dot rows (ist4 — text answer)
function makeDotRows(containerId, start, end, dataMap) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  for (let n = start; n <= end; n++) {
    const idx = n - start + 1;
    const d   = dataMap ? dataMap[idx] : null;
    const row = document.createElement('div');
    row.className = 'answer-row';

    const qnum = document.createElement('span');
    qnum.className = 'qnum';
    qnum.textContent = n + ')';
    row.appendChild(qnum);

    if (d) {
      const span = document.createElement('span');
      span.className = 'dot-filled ' + (d.benar ? 'correct' : 'wrong');
      span.textContent = d.teks;
      row.appendChild(span);

      const mark = document.createElement('span');
      mark.className = 'ans-mark ' + (d.benar ? 'correct' : 'wrong');
      if (d.benar) {
        const skorVal = (d.skor !== undefined) ? d.skor : 1;
        mark.textContent = '✓' + skorVal;
      } else {
        mark.textContent = '✗';
      }
      row.appendChild(mark);
    } else {
      const line = document.createElement('div');
      line.className = 'dot-line';
      row.appendChild(line);
    }

    container.appendChild(row);
  }
}

// ─── COUNT BENAR ─────────────────────────────────────────────
function countBenar(dataMap, from, to, useSkor) {
  let total = 0;
  for (let idx = from; idx <= to; idx++) {
    if (!dataMap[idx]) continue;
    if (useSkor) {
      total += (dataMap[idx].skor || 0);
    } else {
      if (dataMap[idx].benar) total++;
    }
  }
  return total;
}

function setScoreBox(id, label, value, isEmpty) {
  const el = document.getElementById(id);
  if (!el) return;
  if (isEmpty) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML =
    `<span class="box-label">${label}</span>` +
    `<span class="box-value">${value}</span>`;
}

// ─── RENDER ALL (kosong) ─────────────────────────────────────
function getUsiaKey(usia) {
  if (usia >= 19) return '19-20';
  if (usia === 18) return '18';
  if (usia === 17) return '17';
  if (usia === 16) return '16';
  if (usia === 15) return '15';
  if (usia === 14) return '14';
  if (usia === 13) return '13';
  if (usia <= 12)  return '12';
  return '19-20';
}

function renderAll(x08, usia) {
  const ist1  = parseAbcde(x08.ist1  || '');
  const ist2  = parseAbcde(x08.ist2  || '');
  const ist3  = parseAbcde(x08.ist3  || '');
  const ist4  = parseText (x08.ist4_a|| '');
  const ist5  = parseAngka(x08.ist5_a|| '');
  const ist6  = parseAngka(x08.ist6_a|| '');
  const ist7  = parseAbcde(x08.ist7  || '');
  const ist8  = parseAbcde(x08.ist8  || '');
  const ist9  = parseAbcde(x08.ist9  || '');

  // PAGE 1
  makeAbcdeRows('col01',  1,  20, ist1);
  makeAbcdeRows('col02', 21,  40, ist2);
  makeAbcdeRows('col03', 41,  60, ist3);
  makeDotRows  ('col04', 61,  76, ist4);

  // PAGE 2
  makeNumRows  ('col05', 77,  96, ist5);
  makeNumRows  ('col06', 97, 116, ist6);
  makeAbcdeRows('col07',117, 136, ist7);
  makeAbcdeRows('col08a',137, 146, ist8);
  makeAbcdeRows('col08b',147, 156, ist8, 10);  // ist8 lanjutan urutan 11-20
  makeAbcdeRows('col09a',157, 166, ist9);
  makeAbcdeRows('col09b',167, 176, ist9, 10);  // ist9 lanjutan urutan 11-20

  // ── Hitung & tampilkan total benar per subtes ──
  const isEmpty = !x08 || Object.keys(x08).length === 0;

  const subtesInfo = [
    { id: 'box01', label: 'SE', map: ist1, from: 1,  to: 20  },
    { id: 'box02', label: 'WA', map: ist2, from: 1,  to: 20  },
    { id: 'box03', label: 'AN', map: ist3, from: 1,  to: 20  },
    { id: 'box04', label: 'GE', map: ist4, from: 1,  to: 16, useSkor: true  },
    { id: 'box05', label: 'RA', map: ist5, from: 1,  to: 20  },
    { id: 'box06', label: 'ZR', map: ist6, from: 1,  to: 20  },
    { id: 'box07', label: 'FA', map: ist7, from: 1,  to: 20  },
  ];

  subtesInfo.forEach(s => {
    if (isEmpty) {
      setScoreBox(s.id, '', '', true);
    } else {
      const total = countBenar(s.map, s.from, s.to, s.useSkor||false);
      setScoreBox(s.id, s.label, total, false);
    }
  });

  // WÜ (08): satu kotak, total ist8
  if (isEmpty) {
    setScoreBox('box08a', '', '', true);
  } else {
    setScoreBox('box08a', 'WÜ', countBenar(ist8, 1, 20, false), false);
  }

  // ME (09): satu kotak, total ist9
  if (isEmpty) {
    setScoreBox('box09a', '', '', true);
  } else {
    setScoreBox('box09a', 'ME', countBenar(ist9, 1, 20, false), false);
  }

  // ── Konversi GE (jumlah benar → RW) ──
  function convertGE(jumlahBenar) {
    const GE_NORM = [
      { min: 32, max: 999, rw: 20 },
      { min: 30, max: 31,  rw: 19 },
      { min: 29, max: 29,  rw: 18 },
      { min: 28, max: 28,  rw: 17 },
      { min: 27, max: 27,  rw: 16 },
      { min: 25, max: 26,  rw: 15 },
      { min: 23, max: 24,  rw: 14 },
      { min: 21, max: 22,  rw: 13 },
      { min: 19, max: 20,  rw: 12 },
      { min: 17, max: 18,  rw: 11 },
      { min: 15, max: 16,  rw: 10 },
      { min: 13, max: 14,  rw: 9  },
      { min: 11, max: 12,  rw: 8  },
      { min: 9,  max: 10,  rw: 7  },
      { min: 7,  max: 8,   rw: 6  },
      { min: 5,  max: 6,   rw: 5  },
      { min: 4,  max: 4,   rw: 4  },
      { min: 3,  max: 3,   rw: 3  },
      { min: 2,  max: 2,   rw: 2  },
      { min: 0,  max: 1,   rw: 1  },
    ];
    const entry = GE_NORM.find(r => jumlahBenar >= r.min && jumlahBenar <= r.max);
    return entry ? entry.rw : 1;
  }

  // ── Hitung skor per subtes untuk tabel RW ──
  // SE=ist1, WA=ist2, AN=ist3, GE=ist4, ME=ist9, RA=ist5, ZR=ist6, FA=ist7, WU=ist8
  const rwScores = {
    SE: countBenar(ist1, 1, 20, false),
    WA: countBenar(ist2, 1, 20, false),
    AN: countBenar(ist3, 1, 20, false),
    GE: convertGE(countBenar(ist4, 1, 16, true)),
    _GE_raw: countBenar(ist4, 1, 16, true),
    ME: countBenar(ist9, 1, 20, false),
    RA: countBenar(ist5, 1, 20, false),
    ZR: countBenar(ist6, 1, 20, false),
    FA: countBenar(ist7, 1, 20, false),
    WU: countBenar(ist8, 1, 20, false),
  };
  renderRW(rwScores, isEmpty, usia || 0);
}

}

}

}

// ─── MAIN FETCH ──────────────────────────────────────────────
async function cariData() {
  const idVal = document.getElementById('inputId').value.trim();
  if (!idVal) { showErr('⚠ Masukkan id_x peserta terlebih dahulu.'); return; }

  clearErr();
  setBtn(true);

  try {
    const res = await fetch(
      `${API_R}?table=${TBL}&id_x=${encodeURIComponent(idVal)}`,
      { headers: { 'X-Custom-Auth': AUTH } }
    );
    const d = await res.json();

    if (!d.success || !d.data) {
      showErr('⚠ Tidak ada data ditemukan untuk ID: ' + idVal); return;
    }
    const row = Array.isArray(d.data) ? d.data[0] : d.data;
    if (!row) { showErr('⚠ Tidak ada data ditemukan untuk ID: ' + idVal); return; }

    renderBio(row.x_02 || '');

    let x08 = {};
    try { x08 = JSON.parse(row.x_08 || '{}'); } catch {}

    let bio = {};
    try { bio = JSON.parse(row.x_02 || '{}'); } catch {}
    const usiaVal = parseInt(bio.usia) || 0;
    renderAll(x08, usiaVal);

  } catch (e) {
    showErr('⚠ Gagal mengambil data: ' + e.message);
    console.error(e);
  } finally {
    setBtn(false);
  }
}

function getSW(subtes, rw, usia) {
  const norma = NORMA[usia];
  if (!norma) return '';
  const tabel = norma[subtes];
  if (!tabel) return '';
  // Cari RW tepat atau terdekat di bawahnya
  let sw = '';
  for (let i = 0; i < tabel.length; i++) {
    if (rw >= tabel[i][0]) { sw = tabel[i][1]; break; }
  }
  return sw;
}

function getGesamtSW(jml, usia) {
  const norma = NORMA[usia];
  if (!norma || !norma.GESAMT) return '';
  for (const row of norma.GESAMT) {
    if (jml >= row[0] && jml <= row[1]) return row[2];
    if (jml > row[1]) continue;
  }
  return norma.GESAMT[norma.GESAMT.length - 1][2];
}

// ─── RENDER RW TABLE ─────────────────────────────────────────
function renderRW(scores, isEmpty, usia) {
  const keys = ['SE','WA','AN','GE','ME','RA','ZR','FA','WU'];
  const usiaKey = getUsiaKey(usia || 0);
  let jml = 0;
  keys.forEach(k => {
    const elRw = document.getElementById('rw-' + k);
    const elSw = document.getElementById('sw-' + k);
    if (!elRw) return;
    if (isEmpty) {
      elRw.textContent = '';
      if (elSw) elSw.textContent = '';
      elRw.style.cursor = '';
      elRw.onclick = null;
    } else {
      const val = scores[k] !== undefined ? scores[k] : 0;
      elRw.textContent = val;
      jml += val;

      // Isi SW
      if (elSw) {
        const sw = getSW(k === 'WU' ? 'WU' : k, val, usiaKey);
        elSw.textContent = sw;
      }

      // Khusus GE: klik tampilkan jumlah benar asli
      if (k === 'GE') {
        elRw.style.cursor = 'pointer';
        elRw.title = 'Klik untuk lihat jumlah benar GE';
        elRw.style.textDecoration = 'underline dotted';
        elRw.onclick = () => showGEPopup(scores._GE_raw, val);
      }
    }
  });

  const elJml = document.getElementById('rw-JML');
  const elSwJml = document.getElementById('sw-JML');
  if (elJml) elJml.textContent = isEmpty ? '' : jml;
  if (elSwJml) elSwJml.textContent = isEmpty ? '' : getGesamtSW(jml, usiaKey);
}

// ─── GE POPUP ────────────────────────────────────────────────
function showGEPopup(raw, rw) {
  // Hapus popup lama jika ada
  const old = document.getElementById('ge-popup');
  if (old) old.remove();

  const popup = document.createElement('div');
  popup.id = 'ge-popup';
  popup.style.cssText = `
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: #fff; border: 2px solid #1a6ab5; border-radius: 12px;
    padding: 24px 32px; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    font-family: 'Segoe UI', sans-serif; text-align: center; min-width: 220px;
  `;
  popup.innerHTML = `
    <div style="font-size:13px;font-weight:700;color:#0d2a4a;margin-bottom:14px;letter-spacing:0.5px;">
      KONTROL SKOR GE
    </div>
    <div style="display:flex;gap:24px;justify-content:center;margin-bottom:16px;">
      <div>
        <div style="font-size:11px;color:#555;font-weight:600;margin-bottom:4px;">Jumlah Benar</div>
        <div style="font-size:32px;font-weight:900;color:#1a6ab5;">${raw !== undefined ? raw : '-'}</div>
      </div>
      <div style="display:flex;align-items:center;font-size:20px;color:#aaa;">→</div>
      <div>
        <div style="font-size:11px;color:#555;font-weight:600;margin-bottom:4px;">RW (Konversi)</div>
        <div style="font-size:32px;font-weight:900;color:#16a34a;">${rw}</div>
      </div>
    </div>
    <button onclick="document.getElementById('ge-popup').remove()"
      style="padding:7px 22px;background:#1a6ab5;color:#fff;border:none;border-radius:8px;
             font-size:13px;font-weight:700;cursor:pointer;">Tutup</button>
  `;

  // Overlay
  const overlay = document.createElement('div');
  overlay.id = 'ge-overlay';
  overlay.style.cssText = `
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.3);z-index:9998;
  `;
  overlay.onclick = () => { popup.remove(); overlay.remove(); };

  document.body.appendChild(overlay);
  document.body.appendChild(popup);
}
